# Dev catalog for Docker Compose — JDBC targets the `postgres` service.
# For Kubernetes or host Postgres, copy from config/trino-catalog-omop.properties
# and substitute secrets via your secrets manager (no literals in prod).
connector.name=postgresql
connection-url=jdbc:postgresql://postgres:5432/omop
connection-user=omop
connection-password=omop_dev_change_me
postgresql.include-system-tables=false
postgresql.fetch-size=5000
postgresql.experimental.enable-string-pushdown=true
