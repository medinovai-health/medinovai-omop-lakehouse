# Trino catalog configuration for OMOP CDM v5.4
# PostgreSQL connector to OMOP Lakehouse
connector.name=postgresql
connection-url=jdbc:postgresql://${OMOP_DB_HOST}:${OMOP_DB_PORT}/${OMOP_DB_NAME}
connection-user=${OMOP_DB_USER}
connection-password=${OMOP_DB_PASSWORD}
# Schema prefix for multi-tenant isolation
# Each tenant gets: omop_{tenant_id} schema
postgresql.include-system-tables=false
# Performance tuning
postgresql.fetch-size=5000
# Pushdown optimization
postgresql.experimental.enable-string-pushdown=true
